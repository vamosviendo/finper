<html>
<head>
  <title>Finanzas Personales - Movimientos diarios</title>
  <meta charset="utf-8">
</head>
<body>

  <h1>Finanzas Personales - Movimientos diarios</h1>
  <table id="id_table_movs">
    <tr>
      <th>Fecha</th>
      <th>Concepto</th>
      <th>Detalle</th>
      <th>Entrada</th>
      <th>Salida</th>
      <th>Total</th>
    </tr>
    <tr>
      <td>
        <input type="text" id="id_input_fecha" value="{% now 'd-m-Y' %}" />
      </td>
      <td>
        <input type="text" id="id_input_concepto" placeholder="Concepto" />
      </td>
      <td>
        <input type="text" id="id_input_detalle" placeholder="Detalle" />
      </td>
      <td><input type="" id="id_input_entrada"/></td>
      <td><input type="number" id="id_input_salida"/></td>
      <td><span id="id_span_total"></span></td>
    </tr>
  </table>
  
</body>
</html>
